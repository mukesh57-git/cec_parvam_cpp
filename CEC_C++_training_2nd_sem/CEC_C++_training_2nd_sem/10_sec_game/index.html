<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>10 Second Perfect Time</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;500;700;900&display=swap" rel="stylesheet">
</head>
<body>
    <div class="overlay" id="winner-overlay">
        <div class="winner-card">
            <h1 id="winner-text">Player 1 Wins!</h1>
            <p id="winner-subtext">You were 0.05s away from 10 seconds. You have the floor to answer!</p>
            <button id="rematch-btn">Rematch</button>
        </div>
    </div>

    <div class="game-container">
        <header class="game-header">
            <h1>10.00 Seconds Challenge</h1>
            <p>Stop your timer as close to 10.00s as possible. The winner gets to answer!</p>
        </header>
        
        <div class="players-area">
            <!-- Player 1 -->
            <div class="player-panel player-1" id="panel-1">
                <div class="player-info">
                    <h2>Player 1</h2>
                    <span class="key-hint">Press <strong>'A'</strong> or click below</span>
                </div>
                <div class="timer-display" id="timer-1">0.00</div>
                <button class="action-btn" id="btn-1">Start</button>
            </div>

            <!-- VS Divider -->
            <div class="vs-divider">
                <span>VS</span>
            </div>

            <!-- Player 2 -->
            <div class="player-panel player-2" id="panel-2">
                <div class="player-info">
                    <h2>Player 2</h2>
                    <span class="key-hint">Press <strong>'L'</strong> or click below</span>
                </div>
                <div class="timer-display" id="timer-2">0.00</div>
                <button class="action-btn" id="btn-2">Start</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
